name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link e aplicar migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

      - name: Configurar secrets das functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "${{ secrets.SUPABASE_ANON_KEY }}" | supabase secrets set SUPABASE_ANON_KEY --project-ref "$SUPABASE_PROJECT_ID"
          echo "${{ secrets.ALLOWED_ORIGIN }}" | supabase secrets set ALLOWED_ORIGIN --project-ref "$SUPABASE_PROJECT_ID"
          echo "${{ secrets.RATE_LIMIT_MAX }}" | supabase secrets set RATE_LIMIT_MAX --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          for fn in agendamentos agendamentos-id agendamentos-horarios gerar-plano; do
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Smoke test pós-deploy (staging)
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          printf 'SUPABASE_PROJECT_ID=%s\nSUPABASE_ANON_KEY=%s\n' "$SUPABASE_PROJECT_ID" "$SUPABASE_ANON_KEY" > .env.smoke
          node scripts/test-smoke.mjs .env.smoke
          rm -f .env.smoke

  deploy-prod:
    name: Deploy → Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link e aplicar migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

      - name: Configurar secrets das functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "${{ secrets.SUPABASE_ANON_KEY }}" | supabase secrets set SUPABASE_ANON_KEY --project-ref "$SUPABASE_PROJECT_ID"
          echo "${{ secrets.ALLOWED_ORIGIN }}" | supabase secrets set ALLOWED_ORIGIN --project-ref "$SUPABASE_PROJECT_ID"
          echo "${{ secrets.RATE_LIMIT_MAX }}" | supabase secrets set RATE_LIMIT_MAX --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          for fn in agendamentos agendamentos-id agendamentos-horarios gerar-plano; do
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID"
          done
