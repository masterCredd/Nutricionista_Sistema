<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriSystem — Novo Paciente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout-dashboard">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>Nutri<span>System</span></h1>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="pacientes.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Pacientes
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-sidebar-sair" onclick="sair()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <h2>Novo Paciente</h2>
        <p>Preencha os dados do paciente</p>
      </header>

      <form class="form-paciente" onsubmit="salvarPaciente(event)">
        <div class="tabs">
          <button type="button" class="tab-btn active" data-tab="pessoal">Pessoal</button>
          <button type="button" class="tab-btn" data-tab="clinico">Clínico</button>
          <button type="button" class="tab-btn" data-tab="habitos">Hábitos</button>
        </div>

        <!-- ABA 1 - PESSOAL -->
        <div class="tab-content active" id="tab-pessoal">
          <div class="form-row">
            <div class="form-group full">
              <label>Nome completo <span class="required">*</span></label>
              <input type="text" id="nome" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Data de nascimento</label>
              <input type="date" id="data_nascimento" onchange="document.getElementById('idade').value = Math.floor((new Date() - new Date(this.value)) / 31557600000) || ''" />
            </div>
            <div class="form-group">
              <label>Idade</label>
              <input type="text" id="idade" readonly placeholder="Calculada automaticamente" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Sexo</label>
              <select id="sexo">
                <option value="">Selecione</option>
                <option value="Feminino">Feminino</option>
                <option value="Masculino">Masculino</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="tel" id="telefone" placeholder="(48) 99999-9999" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>WhatsApp</label>
              <input type="tel" id="whatsapp" placeholder="(48) 99999-9999" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="paciente@email.com" />
            </div>
          </div>
        </div>

        <!-- ABA 2 - CLÍNICO -->
        <div class="tab-content" id="tab-clinico">
          <div class="form-row">
            <div class="form-group">
              <label>Peso atual <small>(kg)</small></label>
              <input type="number" id="peso" step="0.1" min="0" placeholder="Ex: 65.5" />
            </div>
            <div class="form-group">
              <label>Altura <small>(cm)</small></label>
              <input type="number" id="altura" step="0.1" min="0" placeholder="Ex: 165" />
            </div>
            <div class="form-group">
              <label>IMC</label>
              <input type="text" id="imc" readonly placeholder="Automático" />
            </div>
          </div>

          <div class="form-group full">
            <label>Objetivo</label>
            <div class="check-grid">
              <label><input type="checkbox" name="objetivos" value="Emagrecer" /> Emagrecer</label>
              <label><input type="checkbox" name="objetivos" value="Ganhar massa" /> Ganhar massa</label>
              <label><input type="checkbox" name="objetivos" value="Controlar diabetes" /> Controlar diabetes</label>
              <label><input type="checkbox" name="objetivos" value="Saúde geral" /> Saúde geral</label>
              <label><input type="checkbox" name="objetivos" value="Performance esportiva" /> Performance esportiva</label>
              <label><input type="checkbox" name="objetivos" value="Reeducação alimentar" /> Reeducação alimentar</label>
            </div>
            <input type="text" id="objetivo_texto" placeholder="Outro objetivo..." style="margin-top: 8px;" />
          </div>

          <div class="form-group full">
            <label>Nível de atividade física</label>
            <select id="nivel_atividade">
              <option value="">Selecione</option>
              <option value="Sedentário">Sedentário</option>
              <option value="Levemente ativo">Levemente ativo</option>
              <option value="Moderadamente ativo">Moderadamente ativo</option>
              <option value="Muito ativo">Muito ativo</option>
              <option value="Extremamente ativo">Extremamente ativo</option>
            </select>
          </div>

          <div class="form-group full">
            <label>Patologias ou condições de saúde</label>
            <div class="check-grid">
              <label><input type="checkbox" name="patologias" value="Diabetes" /> Diabetes</label>
              <label><input type="checkbox" name="patologias" value="Hipertensão" /> Hipertensão</label>
              <label><input type="checkbox" name="patologias" value="Hipotireoidismo" /> Hipotireoidismo</label>
              <label><input type="checkbox" name="patologias" value="Hipertireoidismo" /> Hipertireoidismo</label>
              <label><input type="checkbox" name="patologias" value="Síndrome do ovário policístico" /> SOP</label>
              <label><input type="checkbox" name="patologias" value="Doença celíaca" /> Doença celíaca</label>
              <label><input type="checkbox" name="patologias" value="Colesterol alto" /> Colesterol alto</label>
              <label><input type="checkbox" name="patologias" value="nenhum" /> Nenhum</label>
            </div>
            <input type="text" id="patologias_livre" placeholder="Outra condição..." style="margin-top: 8px;" />
          </div>

          <div class="form-group full">
            <label>Restrições alimentares</label>
            <div class="check-grid">
              <label><input type="checkbox" name="restricoes" value="Lactose" /> Lactose</label>
              <label><input type="checkbox" name="restricoes" value="Glúten" /> Glúten</label>
              <label><input type="checkbox" name="restricoes" value="Açúcar" /> Açúcar</label>
              <label><input type="checkbox" name="restricoes" value="Carne vermelha" /> Carne vermelha</label>
              <label><input type="checkbox" name="restricoes" value="Frutos do mar" /> Frutos do mar</label>
              <label><input type="checkbox" name="restricoes" value="nenhum" /> Nenhum</label>
            </div>
            <input type="text" id="restricoes_livre" placeholder="Outra restrição..." style="margin-top: 8px;" />
          </div>

          <div class="form-group full">
            <label>Alergias alimentares</label>
            <div class="check-grid">
              <label><input type="checkbox" name="alergias" value="Amendoim" /> Amendoim</label>
              <label><input type="checkbox" name="alergias" value="Leite" /> Leite</label>
              <label><input type="checkbox" name="alergias" value="Ovo" /> Ovo</label>
              <label><input type="checkbox" name="alergias" value="Soja" /> Soja</label>
              <label><input type="checkbox" name="alergias" value="Trigo" /> Trigo</label>
              <label><input type="checkbox" name="alergias" value="Frutos do mar" /> Frutos do mar</label>
              <label><input type="checkbox" name="alergias" value="nenhum" /> Nenhum</label>
            </div>
            <input type="text" id="alergias_livre" placeholder="Outra alergia..." style="margin-top: 8px;" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Medicamentos contínuos</label>
              <textarea id="medicamentos" rows="2" placeholder="Quais medicamentos a paciente toma?"></textarea>
            </div>
            <div class="form-group">
              <label>Suplementos em uso</label>
              <textarea id="suplementos" rows="2" placeholder="Quais suplementos?"></textarea>
            </div>
          </div>
        </div>

        <!-- ABA 3 - HÁBITOS -->
        <div class="tab-content" id="tab-habitos">
          <div class="form-row">
            <div class="form-group">
              <label>Refeições por dia</label>
              <input type="number" id="refeicoes_por_dia" min="1" max="15" placeholder="Ex: 5" />
            </div>
            <div class="form-group">
              <label>Horário que acorda</label>
              <input type="text" id="horario_acorda" placeholder="Ex: 6 → 06:00 | 630 → 06:30" />
            </div>
            <div class="form-group">
              <label>Horário que dorme</label>
              <input type="text" id="horario_dorme" placeholder="Ex: 23 → 23:00 | 2230 → 22:30" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Água por dia <small>(litros)</small></label>
              <input type="number" id="litros_agua" step="0.1" min="0" placeholder="Ex: 2" />
            </div>
            <div class="form-group">
              <label>Pratica atividade física?</label>
              <div class="radio-group">
                <label><input type="radio" name="atividade_fisica" value="true" /> Sim</label>
                <label><input type="radio" name="atividade_fisica" value="false" checked /> Não</label>
              </div>
            </div>
          </div>

          <div class="form-group full" id="atividade_fisica_descricao_container" style="display: none;">
            <label>Qual atividade e frequência?</label>
            <textarea id="atividade_fisica_descricao" rows="2" placeholder="Ex: Musculação 3x por semana"></textarea>
          </div>

          <div class="form-group full">
            <label>Observações gerais</label>
            <textarea id="observacoes" rows="3" placeholder="Informações adicionais..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <a href="pacientes.html" class="btn btn-outline" style="text-decoration: none; text-align: center;">Cancelar</a>
          <button type="submit" class="btn btn-primary" style="width: auto; padding: 12px 32px;">Salvar Paciente</button>
        </div>
      </form>
    </main>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cadastro-paciente.js"></script>
</body>
</html>
