<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriSystem — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>Nutri<span>System</span></h1>
        <p>Crie sua conta gratuitamente</p>
      </div>

      <div id="error-message" class="error-message"></div>

      <form onsubmit="cadastrar(event)">
        <div class="form-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Seu nome" autocomplete="name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar senha</label>
          <input type="password" id="confirm-password" placeholder="Repita a senha" autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn btn-primary">Criar conta</button>
      </form>

      <div class="footer-link">
        Já tem conta? <a href="index.html">Faça login</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tema.js"></script>
</body>
</html>
