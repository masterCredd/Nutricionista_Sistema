<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriSystem — Pacientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout-dashboard">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>Nutri<span>System</span></h1>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="pacientes.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Pacientes
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-sidebar-theme"></button>
        <button class="btn-sidebar-sair" onclick="sair()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header list-header">
        <div>
          <h2>Pacientes</h2>
          <p>Gerencie seus pacientes</p>
        </div>
        <a href="cadastro-paciente.html" class="btn btn-primary" style="width: auto; padding: 10px 24px; text-decoration: none; font-size: 14px;">
          + Novo Paciente
        </a>
      </header>

      <div class="search-bar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="busca" placeholder="Buscar por nome..." />
      </div>

      <div class="pacientes-main">
        <div class="pacientes-list" id="lista-pacientes"></div>

        <div class="lista-vazia" id="lista-vazia">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <p>Nenhum paciente cadastrado ainda</p>
          <a href="cadastro-paciente.html" class="btn btn-primary" style="width: auto; padding: 10px 24px; text-decoration: none; font-size: 14px; margin-top: 12px;">
            Cadastrar primeiro paciente
          </a>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/pacientes.js"></script>
</body>
</html>
